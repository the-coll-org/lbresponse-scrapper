name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mypy types-requests pandas-stubs

      - name: mypy
        run: mypy config.py main.py scraper/

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t lbresponse-scraper:ci .

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Bandit security scan
        run: bandit -r scraper/ main.py config.py -c pyproject.toml

  secrets:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for private keys in tracked files
        run: |
          echo "Scanning for private keys..."
          PK_PATTERN="BEGIN "
          PK_PATTERN="${PK_PATTERN}PRIVATE KEY"
          if git ls-files -z | xargs -0 grep -l "$PK_PATTERN" 2>/dev/null; then
            echo "::error::Private key found in tracked files!"
            exit 1
          fi
          echo "No private keys found."

      - name: Check for common credential patterns
        run: |
          echo "Scanning for credential patterns..."
          FOUND=0
          SA_PATTERN='"type": "service_'
          SA_PATTERN="${SA_PATTERN}account"'
          if git ls-files -z | xargs -0 grep -l "$SA_PATTERN" 2>/dev/null; then
            echo "::error::Firebase/GCP service account JSON found in tracked files!"
            FOUND=1
          fi
          if git ls-files -z | xargs -0 grep -lE 'AKIA[0-9A-Z]{16}' 2>/dev/null; then
            echo "::error::AWS access key found in tracked files!"
            FOUND=1
          fi
          if [ "$FOUND" -eq 1 ]; then
            exit 1
          fi
          echo "No credential patterns found."
